{% extends "base.html" %}
{% block title %}رصد زنده — خبرگزین{% endblock %}
{% block content %}
<div id="live-bar" class="live-bar">
  <span id="live-dot" class="live-dot"></span>
  <span id="live-clock">در حال بارگذاری…</span>
  <span class="live-meta" id="live-meta"></span>
</div>

<div id="status-grid" class="grid"></div>

<div class="section">
  <h2>آخرین انتشارها <a href="/published" style="font-size:.8rem;font-weight:normal">همه →</a></h2>
  <div id="published-strip"></div>
</div>

<div class="section">
  <h2>منابع — آخرین fetch</h2>
  <div id="sources-strip" class="sources-strip"></div>
</div>

<div class="section">
  <h2>جریان زنده <span style="font-weight:normal;font-size:.8rem">(هر ۸ ثانیه · بدون refresh)</span></h2>
  <p id="feed-hint" class="feed-hint"></p>
  <div id="live-feed"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ACTION_LABELS = {
  merged_into_cluster: 'ادغام با خوشه',
  merged_into_published: 'الحاق به منتشرشده',
  new_cluster: 'خوشه جدید',
  pending_cluster: 'در صف خوشه‌بندی',
  clustered: 'خوشه‌بندی شد',
  message_edited: 'ویرایش',
};

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('fa-IR', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('fa-IR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function renderTimeChip(item) {
  const pub = item.telegram_published_fmt || fmtTime(item.telegram_published);
  const label = pub !== '—' ? pub : (item.fetched_fmt || fmtTime(item.fetched_at));
  const title = item.telegram_published_fmt ? 'انتشار در تلگرام' : 'زمان خوانده‌شده';
  return `
    <details class="time-pop">
      <summary class="time-chip" title="${title}">🕐 ${esc(label)}</summary>
      <div class="time-details">
        <dl>
          <dt>انتشار در کانال منبع</dt>
          <dd>${esc(item.telegram_published_fmt || fmtDateTime(item.telegram_published))}</dd>
          <dt>خوانده‌شده در سیستم</dt>
          <dd>${esc(item.fetched_fmt || fmtDateTime(item.fetched_at))}</dd>
          ${item.has_edit ? `
            <dt>ویرایش در تلگرام</dt>
            <dd>${esc(item.telegram_edited_fmt || fmtDateTime(item.telegram_edited))}</dd>
          ` : ''}
        </dl>
      </div>
    </details>
  `;
}

function renderPublished(pub) {
  const sources = (pub.sources || []).map(s => '@' + esc(s)).join(' · ');
  return `
    <article class="pub-card">
      <header class="pub-head">
        <strong><a href="/clusters/${pub.cluster_id}">خوشه #${pub.cluster_id}</a></strong>
        <span class="badge ok">منتشر ${esc(pub.output_published_fmt)}</span>
        <span>${pub.independent_sources} منبع · ${pub.message_count} پیام</span>
        <span style="color:var(--muted)">${sources}</span>
      </header>
      <div class="pub-body">
        <p><strong>${esc(pub.headline)}</strong></p>
        <p style="color:var(--muted);font-size:.85rem">${esc(pub.summary)}</p>
        <a href="/clusters/${pub.cluster_id}" style="font-size:.8rem">جزئیات مکانیزم ادغام →</a>
      </div>
    </article>
  `;
}

function ageMinutes(iso) {
  if (!iso) return null;
  return Math.round((Date.now() - new Date(iso).getTime()) / 60000);
}

function renderStatus(data) {
  const latestAge = ageMinutes(data.latest_message_at);
  const ageText = latestAge == null ? '—' :
    latestAge < 1 ? 'کمتر از ۱ دقیقه پیش' : `${latestAge} دقیقه پیش`;
  document.getElementById('live-clock').textContent =
    'به‌روز: ' + fmtTime(data.updated_at);
  document.getElementById('live-meta').textContent =
    `آخرین پیام: ${ageText} · تازه: ${data.fresh_count || 0} · fetch نوبتی هر ${data.beat_fetch_sec}s`;

  const grid = document.getElementById('status-grid');
  grid.innerHTML = `
    <div class="card"><div class="label">خوانده‌شده (۱h)</div><div class="value ${data.fetched_last_hour ? 'ok' : ''}">${data.fetched_last_hour}</div></div>
    <div class="card"><div class="label">خوشه‌شده (۱h)</div><div class="value">${data.clustered_last_hour}</div></div>
    <div class="card"><div class="label">خوشه‌نشده</div><div class="value ${data.unclustered ? 'warn' : ''}">${data.unclustered}</div></div>
    <div class="card"><div class="label">ai_ready</div><div class="value">${data.clusters_by_status.ai_ready || 0}</div></div>
    <div class="card"><div class="label">منتشرشده</div><div class="value ok">${data.clusters_by_status.published || 0}</div></div>
    <div class="card"><div class="label">زیر آستانه</div><div class="value">${data.clusters_by_status.below_threshold || 0}</div></div>
  `;

  const pubEl = document.getElementById('published-strip');
  if (data.published_recent && data.published_recent.length) {
    pubEl.innerHTML = data.published_recent.slice(0, 3).map(renderPublished).join('');
  } else {
    pubEl.innerHTML = '<p class="feed-hint">هنوز انتشاری ثبت نشده.</p>';
  }

  const strip = document.getElementById('sources-strip');
  strip.innerHTML = data.sources.map(s => `
    <div class="src-chip ${s.stale ? 'stale' : 'ok'} ${s.active === false ? 'inactive' : ''}">
      <strong>@${esc(s.username)}</strong>
      ${s.active === false ? '<span class="badge warn">غیرفعال</span>' : ''}
      <span>${s.last_fetch ? fmtTime(s.last_fetch) : 'هرگز'}</span>
      ${s.errors ? `<span class="err">${s.errors} خطا</span>` : ''}
    </div>
  `).join('');

  const hint = document.getElementById('feed-hint');
  if (data.feed_empty) {
    hint.textContent = 'پیامی در دیتابیس نیست — منتظر اولین fetch بمانید (~۵ دقیقه).';
    hint.className = 'feed-hint warn';
  } else if (data.feed_mode === 'archive') {
    hint.innerHTML = `فعالیت جدید در ${data.feed_hours || 6}h نیست · نمایش ${data.feed.length} پیام آخر از ${data.messages_total} کل (آرشیو)`;
    hint.className = 'feed-hint warn';
  } else {
    hint.textContent = `${data.feed.length} پیام اخیر (۲h) · ${data.fresh_count || 0} تازه در ۲۰ دقیقه اخیر`;
    hint.className = 'feed-hint';
  }
}

function renderCompared(candidates, peers) {
  let html = '';
  if (candidates && candidates.length) {
    html += '<div class="compare-box"><div class="compare-title">کاندیدهای مقایسه (pgvector)</div>';
    html += candidates.map(c => `
      <div class="compare-row ${c.similarity != null && c.similarity >= 0.72 ? 'match' : ''}">
        <span>خوشه #${c.cluster_id}</span>
        <span class="sim">sim ${c.similarity}</span>
        <span class="badge">${esc(c.status)}</span>
        <span>@${esc(c.sample_source)}</span>
        <div class="preview">${esc(c.preview)}</div>
      </div>
    `).join('');
    html += '</div>';
  }
  if (peers && peers.length) {
    html += '<div class="compare-box"><div class="compare-title">پیام‌های هم‌خوشه</div>';
    html += peers.map(p => `
      <div class="compare-row match">
        <span>@${esc(p.source)}</span>
        <div class="preview">${esc(p.preview)}</div>
      </div>
    `).join('');
    html += '</div>';
  }
  return html;
}

function renderFeed(data) {
  const el = document.getElementById('live-feed');
  if (!data.feed.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = data.feed.map(item => {
    const action = ACTION_LABELS[item.action] || item.action;
    const actionCls = item.action === 'merged_into_cluster' ? 'ok' :
      item.action === 'new_cluster' ? 'warn' : '';
    const clusterLink = item.cluster_id
      ? `<a href="/clusters/${item.cluster_id}">خوشه #${item.cluster_id}</a>`
      : '—';
    const sim = item.similarity != null ? ` · sim ${Number(item.similarity).toFixed(2)}` : '';
    const freshCls = item.is_fresh ? 'fresh' : '';
    const clusterCls = item.cluster_id ? 'clustered' : 'new';
    return `
      <article class="feed-item ${clusterCls} ${freshCls}">
        <header class="feed-head">
          <span class="src">@${esc(item.source)}</span>
          ${renderTimeChip(item)}
          ${item.is_fresh ? '<span class="badge warn">تازه</span>' : ''}
          <span class="badge ${actionCls}">${esc(action)}${sim}</span>
          ${clusterLink}
          ${item.cluster_status ? `<span class="badge">${esc(item.cluster_status)}</span>` : ''}
          ${item.cluster_score != null ? `<span>امتیاز ${item.cluster_score}</span>` : ''}
          ${item.independent_sources > 1 ? `<span class="ok">${item.independent_sources} منبع</span>` : ''}
        </header>
        <div class="feed-text">${esc(item.text)}</div>
        ${renderCompared(item.compared, item.cluster_peers)}
        ${item.ai_headline ? `<div class="ai-out">AI: ${esc(item.ai_headline)}</div>` : ''}
      </article>
    `;
  }).join('');
}

async function refresh() {
  const dot = document.getElementById('live-dot');
  try {
    dot.className = 'live-dot loading';
    const r = await fetch('/api/live', {credentials: 'same-origin'});
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    renderStatus(data);
    renderFeed(data);
    dot.className = 'live-dot ok';
  } catch (e) {
    dot.className = 'live-dot err';
    document.getElementById('live-clock').textContent = 'خطا در دریافت داده';
  }
}

refresh();
setInterval(refresh, 8000);
</script>
{% endblock %}
