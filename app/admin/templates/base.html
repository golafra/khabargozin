<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}خبرگزین{% endblock %}</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --text:#e7ecf3; --muted:#8b9cb3;
            --accent:#3b82f6; --warn:#f59e0b; --err:#ef4444; --ok:#22c55e; --border:#2d3a4f; }
    * { box-sizing: border-box; }
    body { font-family: Tahoma, "Segoe UI", sans-serif; background: var(--bg); color: var(--text);
           margin: 0; line-height: 1.5; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: .75rem 1.25rem;
             display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    nav a { color: var(--muted); margin-left: 1rem; }
    nav a.active, nav a:hover { color: var(--text); }
    main { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .card .label { color: var(--muted); font-size: .8rem; }
    .card .value { font-size: 1.5rem; font-weight: 700; margin-top: .25rem; }
    .warn { color: var(--warn); } .err { color: var(--err); } .ok { color: var(--ok); }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px;
            overflow: hidden; border: 1px solid var(--border); }
    th, td { padding: .55rem .75rem; text-align: right; border-bottom: 1px solid var(--border); }
    th { background: #141c28; color: var(--muted); font-weight: 600; font-size: .8rem; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: .15rem .45rem; border-radius: 4px; font-size: .75rem;
             background: #243044; color: var(--muted); }
    .badge.ok { background: #14532d; color: var(--ok); }
    .badge.warn { background: #422006; color: var(--warn); }
    .badge.err { background: #450a0a; color: var(--err); }
    .filters { margin: 1rem 0; display: flex; gap: .5rem; flex-wrap: wrap; }
    .filters a { padding: .35rem .65rem; border-radius: 6px; background: var(--card);
                 border: 1px solid var(--border); color: var(--muted); }
    .filters a.active { border-color: var(--accent); color: var(--text); }
    .section { margin-top: 1.5rem; }
    .section h2 { font-size: 1rem; margin: 0 0 .75rem; color: var(--muted); }
    .msg { background: var(--card); border: 1px solid var(--border); border-radius: 6px;
           padding: .65rem .85rem; margin-bottom: .5rem; font-size: .85rem; }
    .msg .src { color: var(--accent); font-weight: 600; }
    pre { background: #141c28; padding: .75rem; border-radius: 6px; overflow-x: auto;
          font-size: .8rem; white-space: pre-wrap; word-break: break-word; }
    footer { text-align: center; color: var(--muted); font-size: .75rem; padding: 2rem; }
    .hours-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .hours-bar a, .hours-bar span.btn {
      padding: .35rem .65rem; border-radius: 6px; background: var(--card);
      border: 1px solid var(--border); color: var(--muted); font-size: .85rem;
    }
    .hours-bar a.active { border-color: var(--accent); color: var(--text); }
    .trace { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
             margin-bottom: 1.25rem; overflow: hidden; }
    .trace-head { padding: .75rem 1rem; background: #141c28; display: flex;
                  justify-content: space-between; flex-wrap: wrap; gap: .5rem; align-items: center; }
    .trace-head .meta { color: var(--muted); font-size: .8rem; }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
             border-top: 1px solid var(--border); }
    .step { padding: .65rem .75rem; border-left: 1px solid var(--border); font-size: .8rem; }
    .step:last-child { border-left: none; }
    .step .num { font-weight: 700; color: var(--muted); margin-left: .35rem; }
    .step.ok { background: #0f1a14; } .step.pending { background: #1a1810; }
    .step.fail { background: #1a1010; } .step.skip { opacity: .55; }
    .step-title { font-weight: 600; margin-bottom: .25rem; }
    .in-window { border-right: 3px solid var(--accent); }
    .out-block { padding: .75rem 1rem; border-top: 1px solid var(--border); background: #121a24; }
    .out-block h4 { margin: 0 0 .5rem; font-size: .85rem; color: var(--muted); }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 700px) { .compare { grid-template-columns: 1fr; } }
    .live-bar { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; font-size:.85rem; color:var(--muted); }
    .live-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .live-dot.ok { background:var(--ok); box-shadow:0 0 8px var(--ok); }
    .live-dot.loading { background:var(--warn); animation:pulse 1s infinite; }
    .live-dot.err { background:var(--err); }
    @keyframes pulse { 50% { opacity:.4; } }
    .live-meta { margin-right:auto; }
    .sources-strip { display:flex; flex-wrap:wrap; gap:.5rem; }
    .src-chip { background:var(--card); border:1px solid var(--border); border-radius:6px;
                padding:.4rem .65rem; font-size:.78rem; display:flex; gap:.5rem; align-items:center; }
    .src-chip.ok { border-color:#14532d; }
    .src-chip.stale { border-color:var(--warn); }
    .feed-hint { color:var(--muted); font-size:.85rem; margin:0 0 .75rem; }
    .feed-hint.warn { color:var(--warn); }
    .feed-item { background:var(--card); border:1px solid var(--border); border-radius:8px;
                  margin-bottom:.75rem; overflow:hidden; }
    .feed-item.new { border-right:3px solid var(--accent); }
    .feed-item.clustered { border-right:3px solid var(--ok); }
    .feed-item.fresh { border-right:3px solid var(--warn); }
    .feed-head { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; padding:.55rem .85rem;
                  background:#141c28; font-size:.8rem; }
    .feed-text { padding:.65rem .85rem; font-size:.9rem; }
    .compare-box { padding:.5rem .85rem .75rem; border-top:1px solid var(--border); background:#121a24; }
    .compare-title { font-size:.75rem; color:var(--muted); margin-bottom:.4rem; }
    .compare-row { font-size:.78rem; padding:.35rem .5rem; margin-bottom:.3rem; border-radius:4px;
                   background:#1a2332; border:1px solid var(--border); }
    .compare-row.match { border-color:#14532d; }
    .compare-row .sim { color:var(--accent); font-weight:600; margin:0 .35rem; }
    .compare-row .preview { color:var(--muted); margin-top:.2rem; }
    .ai-out { padding:.5rem .85rem; font-size:.8rem; color:var(--ok); border-top:1px solid var(--border); }
    main { max-width: 1200px; }
    .time-chip { cursor:pointer; border:1px solid var(--border); background:#243044; border-radius:4px;
                 padding:.15rem .45rem; font-size:.75rem; color:var(--text); }
    .time-chip:hover { border-color:var(--accent); }
    .time-details { font-size:.75rem; color:var(--muted); padding:.35rem .85rem .5rem;
                    border-top:1px dashed var(--border); background:#121a24; }
    .time-details dl { margin:0; display:grid; grid-template-columns:auto 1fr; gap:.2rem .75rem; }
    .time-details dt { color:var(--muted); }
    .btn-toggle { padding:.25rem .55rem; border-radius:4px; border:1px solid var(--border);
                  background:#243044; color:var(--text); cursor:pointer; font-size:.78rem; }
    .btn-toggle.off { border-color:var(--warn); color:var(--warn); }
    .btn-toggle.on { border-color:var(--ok); color:var(--ok); }
    .mech-box { background:#121a24; border:1px solid var(--border); border-radius:6px;
                padding:.65rem .85rem; font-size:.8rem; margin-bottom:.75rem; }
    .timeline { border-right:2px solid var(--border); margin-right:.5rem; padding-right:1rem; }
    .timeline-item { margin-bottom:.65rem; font-size:.82rem; }
    .timeline-item .at { color:var(--muted); font-size:.75rem; }
    .pub-card { background:var(--card); border:1px solid var(--border); border-radius:8px;
                margin-bottom:1rem; overflow:hidden; }
    .pub-head { padding:.75rem 1rem; background:#141c28; display:flex; flex-wrap:wrap;
                gap:.5rem; align-items:center; }
    .pub-body { padding:.75rem 1rem; }
    details.time-pop summary { list-style:none; }
    details.time-pop summary::-webkit-details-marker { display:none; }
  </style>
</head>
<body>
  <header>
    <h1>خبرگزین — پنل عملیاتی</h1>
    <nav>
      <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">رصد زنده</a>
      <a href="/published" class="{% if active == 'published' %}active{% endif %}">انتشارها</a>
      <a href="/pipeline" class="{% if active == 'pipeline' %}active{% endif %}">مسیر پردازش</a>
      <a href="/sources" class="{% if active == 'sources' %}active{% endif %}">منابع</a>
      <a href="/clusters" class="{% if active == 'clusters' %}active{% endif %}">خوشه‌ها</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>رصد زنده — هر ۸ ثانیه خودکار به‌روز می‌شود</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
