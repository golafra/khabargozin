services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: khabargozin
      POSTGRES_PASSWORD: khabargozin
      POSTGRES_DB: khabargozin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khabargozin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker -Q default,ml,celery --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://khabargozin:khabargozin@postgres:5432/khabargozin
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://khabargozin:khabargozin@postgres:5432/khabargozin
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - worker
    volumes:
      - .:/app
    restart: unless-stopped

  flower:
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    profiles:
      - monitoring

  admin:
    build: .
    command: uvicorn app.admin.app:app --host 0.0.0.0 --port 8080 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://khabargozin:khabargozin@postgres:5432/khabargozin
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  pgdata:
